openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Algo trading strategy lab API (real BTC/USDT data, momentum trend crossover)
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: market
    description: Market data
  - name: strategies
    description: Strategy catalog
  - name: backtest
    description: Backtest operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /market/btc:
    get:
      operationId: getBtcData
      tags: [market]
      summary: Get historical BTC/USDT OHLC data from Binance
      parameters:
        - in: query
          name: interval
          required: true
          schema:
            $ref: "#/components/schemas/Interval"
        - in: query
          name: lookbackDays
          schema:
            type: integer
            default: 365
            minimum: 7
            maximum: 1825
      responses:
        "200":
          description: BTC price series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketSeries"
  /strategies:
    get:
      operationId: listStrategies
      tags: [strategies]
      summary: List available strategies
      responses:
        "200":
          description: Strategy catalog
          content:
            application/json:
              schema:
                type: object
                required: [strategies]
                properties:
                  strategies:
                    type: array
                    items:
                      $ref: "#/components/schemas/StrategyMeta"
  /backtest/run:
    post:
      operationId: runBacktest
      tags: [backtest]
      summary: Run a single backtest with walk-forward validation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestRequest"
      responses:
        "200":
          description: Full backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestResult"
  /backtest/optimize:
    post:
      operationId: runOptimization
      tags: [backtest]
      summary: Grid-search optimization across strategy + risk parameters with walk-forward
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptimizeRequest"
      responses:
        "200":
          description: Optimization results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizeResult"
  /backtest/tournament:
    post:
      operationId: runTournament
      tags: [backtest]
      summary: Run every available strategy on the same data and rank them
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentRequest"
      responses:
        "200":
          description: Tournament leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentResult"
  /backtest/compare:
    post:
      operationId: compareStrategies
      tags: [backtest]
      summary: Compare multiple parameter sets head-to-head
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareRequest"
      responses:
        "200":
          description: Comparison results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareResult"
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Interval:
      type: string
      enum: ["5m", "15m", "30m", "1h", "2h", "4h", "1d"]
      description: Candle timeframe

    Candle:
      type: object
      required: [t, o, h, l, c, v]
      properties:
        t:
          type: string
          description: ISO datetime (UTC)
        o: { type: number }
        h: { type: number }
        l: { type: number }
        c: { type: number }
        v: { type: number, description: Volume in base asset }

    MarketSeries:
      type: object
      required: [symbol, interval, candles, source]
      properties:
        symbol: { type: string }
        interval:
          $ref: "#/components/schemas/Interval"
        source: { type: string, description: e.g. "binance" }
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"

    StrategyParam:
      type: object
      required: [key, label, type, default, min, max, step]
      properties:
        key: { type: string }
        label: { type: string }
        type:
          type: string
          enum: [number]
        default: { type: number }
        min: { type: number }
        max: { type: number }
        step: { type: number }
        description: { type: string }

    StrategyMeta:
      type: object
      required: [id, name, tagline, description, category, risk, params]
      properties:
        id: { type: string }
        name: { type: string }
        tagline: { type: string }
        description: { type: string }
        category:
          type: string
          enum: [smc, trend, mean_reversion, breakout, orderflow, advanced]
        risk:
          type: string
          enum: [low, medium, high, extreme]
        params:
          type: array
          items:
            $ref: "#/components/schemas/StrategyParam"
        available:
          type: boolean
          description: false when the strategy requires data not available in this lab (e.g. order book, funding, second asset)
        unavailableReason:
          type: string
          description: Human-readable reason when available=false

    RiskConfig:
      type: object
      required:
        - leverage
        - atrPeriod
        - atrMultiplierSL
        - riskRewardRatio
        - makerFeePct
        - takerFeePct
        - slippagePct
      properties:
        leverage:
          type: number
          minimum: 1
          maximum: 50
          description: Linear leverage (10-20 recommended)
        atrPeriod:
          type: integer
          minimum: 5
          maximum: 50
          description: Period for ATR calculation (default 14)
        atrMultiplierSL:
          type: number
          minimum: 0.25
          maximum: 5
          description: SL distance = ATR × this multiplier
        riskRewardRatio:
          type: number
          minimum: 0.5
          maximum: 10
          description: TP distance = SL distance × this ratio
        makerFeePct:
          type: number
          minimum: 0
          maximum: 1
          description: Maker fee % (e.g. 0.01 = 0.01% for limit fills like TP)
        takerFeePct:
          type: number
          minimum: 0
          maximum: 1
          description: Taker fee % (e.g. 0.035 = 0.035% for market entries and SL)
        slippagePct:
          type: number
          minimum: 0
          maximum: 1
          description: Slippage % applied to market orders (entries and SL exits)

    BacktestRequest:
      type: object
      required:
        - strategyId
        - params
        - interval
        - lookbackDays
        - initialCapital
        - risk
      properties:
        strategyId: { type: string }
        params:
          type: object
          additionalProperties:
            type: number
        interval:
          $ref: "#/components/schemas/Interval"
        lookbackDays:
          type: integer
          minimum: 7
          maximum: 1825
        initialCapital:
          type: number
          minimum: 100
          default: 1000
        risk:
          $ref: "#/components/schemas/RiskConfig"
        walkForwardSplit:
          type: number
          minimum: 0.3
          maximum: 0.9
          default: 0.7
          description: Fraction used for in-sample (rest is out-of-sample). Ignored if walkForwardSplitDate is set.
        walkForwardSplitDate:
          type: string
          description: ISO date — candles strictly before this date are in-sample; everything from this date is out-of-sample. Overrides walkForwardSplit when present.

    EquityPoint:
      type: object
      required: [t, equity, drawdown]
      properties:
        t: { type: string }
        equity: { type: number }
        drawdown: { type: number }

    Trade:
      type: object
      required:
        - entryTime
        - exitTime
        - side
        - entryPrice
        - exitPrice
        - stopPrice
        - takeProfitPrice
        - pnl
        - pnlPct
        - feePaid
        - exitReason
        - sample
      properties:
        entryTime: { type: string }
        exitTime: { type: string }
        side:
          type: string
          enum: [long, short]
        entryPrice: { type: number }
        exitPrice: { type: number }
        stopPrice: { type: number }
        takeProfitPrice: { type: number }
        pnl: { type: number }
        pnlPct: { type: number }
        feePaid: { type: number }
        exitReason:
          type: string
          enum: [stop_loss, take_profit, signal_exit, end_of_data, liquidation]
        sample:
          type: string
          enum: [in_sample, out_of_sample]

    BacktestMetrics:
      type: object
      required:
        - totalReturnPct
        - annualReturnPct
        - maxDrawdownPct
        - sharpe
        - sortino
        - winRate
        - profitFactor
        - trades
        - wins
        - losses
        - avgWinPct
        - avgLossPct
        - finalEquity
        - liquidations
        - verdict
      properties:
        totalReturnPct: { type: number }
        annualReturnPct: { type: number }
        maxDrawdownPct: { type: number }
        sharpe: { type: number }
        sortino: { type: number }
        winRate: { type: number }
        profitFactor: { type: number }
        trades: { type: integer }
        wins: { type: integer }
        losses: { type: integer }
        avgWinPct: { type: number }
        avgLossPct: { type: number }
        finalEquity: { type: number }
        liquidations: { type: integer }
        verdict:
          type: string
          enum: [excellent, good, mediocre, poor, blown]

    WalkForwardSummary:
      type: object
      required: [splitDate, inSample, outOfSample, robustnessScore]
      properties:
        splitDate: { type: string }
        inSample:
          $ref: "#/components/schemas/BacktestMetrics"
        outOfSample:
          $ref: "#/components/schemas/BacktestMetrics"
        robustnessScore:
          type: number
          description: Ratio of OOS APY to IS APY (1.0 = no degradation, <0.5 = likely overfit)

    BacktestResult:
      type: object
      required:
        - strategyId
        - request
        - metrics
        - walkForward
        - equityCurve
        - trades
        - candles
      properties:
        strategyId: { type: string }
        request:
          $ref: "#/components/schemas/BacktestRequest"
        metrics:
          $ref: "#/components/schemas/BacktestMetrics"
        walkForward:
          $ref: "#/components/schemas/WalkForwardSummary"
        equityCurve:
          type: array
          items:
            $ref: "#/components/schemas/EquityPoint"
        trades:
          type: array
          items:
            $ref: "#/components/schemas/Trade"
        candles:
          type: array
          items:
            $ref: "#/components/schemas/Candle"

    GridAxis:
      type: object
      required: [key, values]
      properties:
        key:
          type: string
          description: Parameter key — strategy param key, or one of "leverage", "atrMultiplierSL", "riskRewardRatio"
        values:
          type: array
          items: { type: number }

    OptimizeRequest:
      type: object
      required:
        - strategyId
        - baseParams
        - interval
        - lookbackDays
        - initialCapital
        - baseRisk
        - axes
      properties:
        strategyId: { type: string }
        baseParams:
          type: object
          additionalProperties:
            type: number
          description: Default strategy params; axes override these per-combo
        interval:
          $ref: "#/components/schemas/Interval"
        lookbackDays:
          type: integer
          minimum: 7
          maximum: 1825
        initialCapital:
          type: number
        baseRisk:
          $ref: "#/components/schemas/RiskConfig"
        axes:
          type: array
          items:
            $ref: "#/components/schemas/GridAxis"
        walkForwardSplit:
          type: number
          minimum: 0.3
          maximum: 0.9
          default: 0.7
        walkForwardSplitDate:
          type: string
          description: ISO date split — overrides walkForwardSplit
        maxDrawdownFilterPct:
          type: number
          default: 40
          description: Drop combos whose IS max drawdown exceeds this %
        maxCombos:
          type: integer
          default: 10000
          maximum: 10000
        topN:
          type: integer
          default: 100
          minimum: 1
          maximum: 500
          description: Cap response leaderboard to top N kept rows (default 100)

    OptimizeRow:
      type: object
      required:
        - params
        - risk
        - inSample
        - outOfSample
        - robustnessScore
        - filtered
      properties:
        params:
          type: object
          additionalProperties:
            type: number
        risk:
          $ref: "#/components/schemas/RiskConfig"
        inSample:
          $ref: "#/components/schemas/BacktestMetrics"
        outOfSample:
          $ref: "#/components/schemas/BacktestMetrics"
        robustnessScore:
          type: number
        filtered:
          type: boolean
          description: True if dropped by drawdown filter

    OptimizeResult:
      type: object
      required:
        - strategyId
        - rows
        - best
        - totalCombos
        - kept
        - dropped
        - drawdownFilterPct
      properties:
        strategyId: { type: string }
        rows:
          type: array
          items:
            $ref: "#/components/schemas/OptimizeRow"
        best:
          $ref: "#/components/schemas/OptimizeRow"
        totalCombos: { type: integer }
        kept: { type: integer }
        dropped: { type: integer }
        drawdownFilterPct: { type: number }
        topN:
          type: integer
          description: Number of rows returned in `rows` (kept-only leaderboard)

    TournamentRequest:
      type: object
      required: [interval, lookbackDays, initialCapital, risk]
      properties:
        strategyIds:
          type: array
          items: { type: string }
          description: Optional explicit list. If omitted, runs every available strategy with its default params.
        interval:
          $ref: "#/components/schemas/Interval"
        lookbackDays:
          type: integer
          minimum: 7
          maximum: 1825
        initialCapital:
          type: number
          minimum: 100
          default: 1000
        risk:
          $ref: "#/components/schemas/RiskConfig"
        walkForwardSplit:
          type: number
          minimum: 0.3
          maximum: 0.9
          default: 0.7
        walkForwardSplitDate:
          type: string
          description: ISO date split (e.g. 2025-01-01 to train on 2024 / test on 2025+)
        maxDrawdownFilterPct:
          type: number
          default: 40

    TournamentRow:
      type: object
      required:
        - strategyId
        - strategyName
        - category
        - inSample
        - outOfSample
        - robustnessScore
        - filtered
      properties:
        strategyId: { type: string }
        strategyName: { type: string }
        category: { type: string }
        inSample:
          $ref: "#/components/schemas/BacktestMetrics"
        outOfSample:
          $ref: "#/components/schemas/BacktestMetrics"
        robustnessScore: { type: number }
        filtered: { type: boolean }
        error: { type: string }

    TournamentResult:
      type: object
      required: [rows, totalStrategies, kept, dropped, drawdownFilterPct]
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/TournamentRow"
        best:
          $ref: "#/components/schemas/TournamentRow"
        totalStrategies: { type: integer }
        kept: { type: integer }
        dropped: { type: integer }
        drawdownFilterPct: { type: number }
        splitDate: { type: string }

    CompareRequest:
      type: object
      required: [requests, labels]
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/BacktestRequest"
        labels:
          type: array
          items: { type: string }

    CompareResult:
      type: object
      required: [results, labels]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/BacktestResult"
        labels:
          type: array
          items: { type: string }
