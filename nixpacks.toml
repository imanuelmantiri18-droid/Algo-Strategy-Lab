[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@9.15.0",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = []

[start]
cmd = "pnpm --filter @workspace/api-server run live -- --strategy=fractal_breakout --interval=1h --leverage=20 --risk=10 --capital=100 --symbol=BTCUSDT"
